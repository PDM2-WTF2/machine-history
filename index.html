<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ประวัติเครื่องจักร</title>
<link rel="icon" type="image/png" href="favicon.png.jpg">
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden}
  iframe{border:0;width:100%;height:100%;display:block}
  .load{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
        font-family:sans-serif;color:#1a5276}
</style>
</head>
<body>
<div class="load" id="ld">กำลังโหลดข้อมูล...</div>
<iframe id="app" onload="document.getElementById('ld').style.display='none'"></iframe>
<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWsCbuEkZ7fHtvAlRSk0n0L91LOrncg_Z4nLLe8j5fPhE3pNNLX6cMqhAfEyDWh9sxgg/exec";

  // ---- ตั้งชื่อแท็บจากพารามิเตอร์ใน URL ----
  const q  = new URLSearchParams(window.location.search);
  const mc   = q.get("mc")   || "";
  const line = q.get("line") || "";
const g = q.get("g") || "";
  if (g) document.title = g;
  if (mc) {
    // เช่น "Steamer - Line # 9" หรือ "Steamer" ถ้าไม่ระบุไลน์
    document.title = mc + (line ? " - Line # " + line : "");
  } else if (q.get("topic")) {
    document.title = "ประวัติงานบำรุงรักษา";
  }

  // ส่งต่อพารามิเตอร์เข้าไปยังหน้า Apps Script
  document.getElementById("app").src = SCRIPT_URL + window.location.search;
</script>
</body>
</html>
